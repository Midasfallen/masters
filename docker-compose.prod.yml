# Production-конфигурация. Запуск: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# Все секреты берутся из env-файла (.env.prod) — НЕТ хардкода credentials.
# В отличие от dev (docker-compose.yml): нет Adminer/MailHog, порты БД/Redis/Meili/MinIO
# не публикуются наружу, добавлены backend + nginx (reverse proxy + TLS).

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: service_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - service_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: service_redis_prod
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - service_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.5
    container_name: service_meilisearch_prod
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - service_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: service_minio_prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - service_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Инициализация бакетов MinIO
  minio_createbuckets:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: service_minio_setup_prod
    depends_on:
      - minio
    volumes:
      - ./docker/minio-cors.json:/tmp/minio-cors.json:ro
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      /usr/bin/mc mb myminio/avatars --ignore-existing;
      /usr/bin/mc mb myminio/posts --ignore-existing;
      /usr/bin/mc mb myminio/videos --ignore-existing;
      /usr/bin/mc mb myminio/portfolios --ignore-existing;
      /usr/bin/mc anonymous set download myminio/avatars;
      /usr/bin/mc anonymous set download myminio/posts;
      /usr/bin/mc anonymous set download myminio/videos;
      /usr/bin/mc anonymous set download myminio/portfolios;
      /usr/bin/mc cors set /tmp/minio-cors.json myminio/avatars;
      /usr/bin/mc cors set /tmp/minio-cors.json myminio/posts;
      /usr/bin/mc cors set /tmp/minio-cors.json myminio/videos;
      /usr/bin/mc cors set /tmp/minio-cors.json myminio/portfolios;
      exit 0;
      "
    networks:
      - service_network

  # Backend (NestJS) — собирается из исходников, миграции применяются в entrypoint
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: service-platform-backend:latest
    container_name: service_backend_prod
    restart: always
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - service_network

  # Nginx — reverse proxy, TLS termination, проксирование API + WebSocket
  nginx:
    image: nginx:1.27-alpine
    container_name: service_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - service_network

networks:
  service_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  minio_data:
    driver: local
  certbot_www:
    driver: local
